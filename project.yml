name: OKToWake
options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
targets:
  OKToWake:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      # Bundled audio is a resource, not compiled source; exclude it here and
      # add it back with an explicit resources build phase.
      - path: Sources
        excludes:
          - "App/Audio/**"
      - path: Sources/App/Audio
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.levelup.oktowake
        PRODUCT_NAME: OK to Wake
        DEVELOPMENT_TEAM: 6A4J2GTB6F
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: OK to Wake
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        # Keeps white noise alive across brief backgrounding (PRD edge row 10);
        # the supported model is still foreground-all-night.
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        # The app owns the whole screen all night (PRD B); full-screen (no
        # iPad multitasking) also lets the dev -demoLandscape orientation
        # hook work for sim screenshots.
        UIRequiresFullScreen: true
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
